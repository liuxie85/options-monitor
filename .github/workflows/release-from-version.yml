name: Release from VERSION

on:
  push:
    branches:
      - main
    paths:
      - VERSION

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          bash scripts/install_agent_plugin.sh
          ./.venv/bin/pip install pytest

      - name: Resolve release metadata
        id: release_meta
        run: |
          VERSION="$(tr -d '\n' < VERSION)"
          TAG="v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Validate release metadata
        run: |
          chmod +x ./om-agent
          ./.venv/bin/python scripts/release_check.py --tag "${{ steps.release_meta.outputs.tag }}" --render-notes-out /tmp/release-notes.md
          ./om-agent spec > /tmp/om-agent-spec.json

      - name: Smoke and plugin tests
        run: |
          ./.venv/bin/python tests/run_smoke.py
          ./.venv/bin/python -m pytest tests/test_agent_plugin_contract.py tests/test_agent_plugin_smoke.py

      - name: Build source archive
        run: |
          git archive --format=tar.gz --output options-monitor-${{ steps.release_meta.outputs.tag }}.tar.gz HEAD

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: ${{ steps.release_meta.outputs.tag }}
          target_commitish: ${{ github.sha }}
          body_path: /tmp/release-notes.md
          files: |
            options-monitor-${{ steps.release_meta.outputs.tag }}.tar.gz
            /tmp/om-agent-spec.json
            VERSION
