name: Reusable Release

on:
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
      target_commitish:
        required: false
        type: string
        default: ""

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          bash scripts/install_agent_plugin.sh
          ./.venv/bin/pip install pytest

      - name: Validate release metadata
        run: |
          chmod +x ./om-agent
          ./.venv/bin/python scripts/release_check.py --tag "${{ inputs.tag }}" --render-notes-out /tmp/release-notes.md
          ./om-agent spec > /tmp/om-agent-spec.json

      - name: Smoke and plugin tests
        run: |
          ./.venv/bin/python tests/run_smoke.py
          ./.venv/bin/python -m pytest tests/test_agent_plugin_contract.py tests/test_agent_plugin_smoke.py

      - name: Build source archive
        run: |
          git archive --format=tar.gz --output options-monitor-${{ inputs.tag }}.tar.gz HEAD

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.tag }}
          target_commitish: ${{ inputs.target_commitish || github.sha }}
          body_path: /tmp/release-notes.md
          files: |
            options-monitor-${{ inputs.tag }}.tar.gz
            /tmp/om-agent-spec.json
            VERSION
